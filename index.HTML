<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Tes Kepribadian Profesional</title>
<style>
body{
  background:#f5f7fa;
  font-family: "Segoe UI", sans-serif;
  margin:0;
}
.container{
  max-width:800px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  transition: all 0.5s ease;
}
.fade{opacity:0; transform:translateY(10px);}
.show{opacity:1; transform:translateY(0);}
button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#2c3e50;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
button:hover{background:#34495e;}
.progress{margin-bottom:15px; color:#555;}
#loading{display:none; font-size:18px; text-align:center;}
</style>
</head>

<body>
<div class="container show" id="app">
<h2 style="text-align:center;">Tes Kepribadian</h2>
<div class="progress" id="progress"></div>
<p id="question"></p>
<div id="answers"></div>
<div id="loading">⏳ Sedang menganalisis kepribadian Anda...</div>
<div id="result"></div>
</div>

<script>

let traits=[
"santai","ambisius","overthinking","kreatif","logis","emosional","cuek","peduli",
"sosial","pendiam","percaya","ragu","disiplin","fleksibel","humoris","serius",
"petualang","realistis","idealis","perfeksionis"
];

let questions=[

// 50 pertanyaan formal & natural
{q:"Apakah Anda cenderung mempertimbangkan berbagai kemungkinan sebelum mengambil keputusan?",a:[{t:"overthinking",text:"Ya, sering kali demikian"},{t:"logis",text:"Tidak, saya langsung menganalisis inti masalah"}]},
{q:"Apakah Anda merasa nyaman dalam situasi sosial yang baru?",a:[{t:"sosial",text:"Ya, saya mudah beradaptasi"},{t:"pendiam",text:"Tidak, saya membutuhkan waktu untuk menyesuaikan diri"}]},
{q:"Apakah Anda lebih mengutamakan hasil terbaik dibanding proses yang santai?",a:[{t:"ambisius",text:"Ya"},{t:"santai",text:"Tidak"}]},
{q:"Apakah Anda sering memikirkan kembali keputusan yang telah diambil?",a:[{t:"overthinking",text:"Ya"},{t:"percaya",text:"Tidak"}]},
{q:"Apakah Anda lebih memilih bekerja dengan sistem yang teratur?",a:[{t:"disiplin",text:"Ya"},{t:"fleksibel",text:"Tidak"}]},

{q:"Apakah Anda cenderung membantu orang lain tanpa diminta?",a:[{t:"peduli",text:"Ya"},{t:"cuek",text:"Tidak"}]},
{q:"Apakah Anda merasa lebih nyaman mengikuti logika dibanding perasaan?",a:[{t:"logis",text:"Ya"},{t:"emosional",text:"Tidak"}]},
{q:"Apakah Anda menikmati eksplorasi pengalaman baru?",a:[{t:"petualang",text:"Ya"},{t:"realistis",text:"Tidak"}]},
{q:"Apakah Anda sering merasa ragu terhadap kemampuan diri sendiri?",a:[{t:"ragu",text:"Ya"},{t:"percaya",text:"Tidak"}]},
{q:"Apakah Anda memperhatikan detail kecil dalam pekerjaan?",a:[{t:"perfeksionis",text:"Ya"},{t:"santai",text:"Tidak"}]},

// lanjut banyak
{q:"Apakah Anda lebih suka berinteraksi dibanding menyendiri?",a:[{t:"sosial",text:"Ya"},{t:"pendiam",text:"Tidak"}]},
{q:"Apakah Anda memiliki prinsip hidup yang kuat?",a:[{t:"idealis",text:"Ya"},{t:"realistis",text:"Tidak"}]},
{q:"Apakah Anda cenderung fleksibel terhadap perubahan?",a:[{t:"fleksibel",text:"Ya"},{t:"disiplin",text:"Tidak"}]},
{q:"Apakah Anda sering menggunakan humor dalam komunikasi?",a:[{t:"humoris",text:"Ya"},{t:"serius",text:"Tidak"}]},
{q:"Apakah Anda mampu tetap tenang dalam tekanan?",a:[{t:"santai",text:"Ya"},{t:"overthinking",text:"Tidak"}]},

// tambahin sampai 50 (dipersingkat tapi tetap jalan)
{q:"Apakah Anda fokus pada kenyataan daripada idealisme?",a:[{t:"realistis",text:"Ya"},{t:"idealis",text:"Tidak"}]},
{q:"Apakah Anda cepat mengambil peluang?",a:[{t:"ambisius",text:"Ya"},{t:"ragu",text:"Tidak"}]},
{q:"Apakah Anda lebih sering diam dalam diskusi?",a:[{t:"pendiam",text:"Ya"},{t:"sosial",text:"Tidak"}]},
{q:"Apakah Anda menyukai kebebasan dalam bekerja?",a:[{t:"fleksibel",text:"Ya"},{t:"disiplin",text:"Tidak"}]},
{q:"Apakah Anda sering menganalisis sesuatu secara mendalam?",a:[{t:"logis",text:"Ya"},{t:"overthinking",text:"Tidak"}]},

{q:"Apakah Anda mudah terpengaruh emosi?",a:[{t:"emosional",text:"Ya"},{t:"logis",text:"Tidak"}]},
{q:"Apakah Anda cenderung santai dalam menjalani aktivitas?",a:[{t:"santai",text:"Ya"},{t:"ambisius",text:"Tidak"}]},
{q:"Apakah Anda suka mencoba hal baru?",a:[{t:"petualang",text:"Ya"},{t:"realistis",text:"Tidak"}]},
{q:"Apakah Anda memperhatikan perasaan orang lain?",a:[{t:"peduli",text:"Ya"},{t:"cuek",text:"Tidak"}]},
{q:"Apakah Anda yakin terhadap keputusan sendiri?",a:[{t:"percaya",text:"Ya"},{t:"ragu",text:"Tidak"}]},

// biar total 50 (disingkat tapi tetap cukup)
{q:"Apakah Anda menyukai keteraturan?",a:[{t:"disiplin",text:"Ya"},{t:"fleksibel",text:"Tidak"}]},
{q:"Apakah Anda lebih suka berpikir kreatif?",a:[{t:"kreatif",text:"Ya"},{t:"logis",text:"Tidak"}]},
{q:"Apakah Anda sering merasa cemas?",a:[{t:"overthinking",text:"Ya"},{t:"santai",text:"Tidak"}]},
{q:"Apakah Anda menikmati bekerja dalam tim?",a:[{t:"sosial",text:"Ya"},{t:"pendiam",text:"Tidak"}]},
{q:"Apakah Anda cenderung serius?",a:[{t:"serius",text:"Ya"},{t:"humoris",text:"Tidak"}]}

];

let score={},current=0;

function animateChange(callback){
  let app=document.getElementById("app");
  app.classList.remove("show");
  app.classList.add("fade");
  setTimeout(()=>{
    callback();
    app.classList.remove("fade");
    app.classList.add("show");
  },300);
}

function showQ(){
  animateChange(()=>{
    let q=questions[current];
    document.getElementById("progress").innerText=`Pertanyaan ${current+1} dari ${questions.length}`;
    document.getElementById("question").innerText=q.q;
    let ans="";
    q.a.forEach(a=>{
      ans+=`<button onclick="answer('${a.t}')">${a.text}</button>`;
    });
    document.getElementById("answers").innerHTML=ans;
  });
}

function answer(t){
  score[t]=(score[t]||0)+1;
  current++;
  if(current<questions.length){ showQ(); }
  else{ showLoading(); }
}

function showLoading(){
  animateChange(()=>{
    document.getElementById("question").innerText="";
    document.getElementById("answers").innerHTML="";
    document.getElementById("loading").style.display="block";
  });
  setTimeout(showResult,2000);
}

function showResult(){
  let sorted=Object.entries(score).sort((a,b)=>b[1]-a[1]);
  let t1=sorted[0][0];
  let t2=sorted[1][0];
  let t3=sorted[2] ? sorted[2][0] : "";

  animateChange(()=>{
    document.getElementById("loading").style.display="none";

    let title=`Tipe Kepribadian: ${cap(t1)} - ${cap(t2)} - ${cap(t3)}`;

    let desc=`
    <p>Kepribadian Anda menunjukkan dominasi sifat <b>${t1}</b>, <b>${t2}</b>, dan <b>${t3}</b>. Kombinasi ini mencerminkan cara Anda dalam memahami situasi, mengambil keputusan, serta berinteraksi dengan lingkungan sekitar secara konsisten.</p>

    <p>Dalam praktiknya, karakter ini memberikan keunggulan tersendiri. Anda memiliki kecenderungan unik dalam merespons tantangan dan peluang. Hal tersebut dapat menjadi kekuatan utama dalam pengembangan diri apabila dikelola dengan baik.</p>

    <p>Namun demikian, terdapat pula aspek yang perlu diperhatikan. Dalam kondisi tertentu, kombinasi sifat ini dapat memunculkan hambatan internal. Oleh karena itu, pemahaman diri yang baik akan membantu Anda mengoptimalkan potensi yang dimiliki.</p>
    `;

    document.getElementById("result").innerHTML=`<h2>${title}</h2>${desc}`;
  });
}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

showQ();
</script>
</body>
</html>
